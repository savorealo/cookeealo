<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 260" width="900" height="260">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0a0300"/>
      <stop offset="100%" stop-color="#180a00"/>
    </linearGradient>
    <linearGradient id="pipe-h" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#FF6B00" stop-opacity="0.1"/>
      <stop offset="50%"  stop-color="#FF9A00" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#FF6B00" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="pipe-v" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#FF6B00" stop-opacity="0.1"/>
      <stop offset="50%"  stop-color="#FF9A00" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#FF6B00" stop-opacity="0.1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M1,1 L8,5 L1,9" fill="none" stroke="#FF9A00" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M1,1 L8,5 L1,9" fill="none" stroke="#27ae60" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Fondo -->
  <rect width="900" height="260" fill="url(#bg)" rx="12"/>
  <rect width="900" height="260" fill="none" stroke="#FF6B00" stroke-width="1" rx="12" opacity="0.3"/>

  <!-- Título -->
  <text x="450" y="26" font-family="'Segoe UI',sans-serif" font-size="12" font-weight="600"
    text-anchor="middle" fill="#FF9A00" letter-spacing="3">CI/CD PIPELINE — GITHUB ACTIONS</text>
  <line x1="180" y1="34" x2="720" y2="34" stroke="#FF6B00" stroke-width="0.5" opacity="0.25"/>

  <!-- ── TRIGGER ── -->
  <rect x="20" y="50" width="130" height="52" rx="8" fill="#1a0800" stroke="#FF6B00" stroke-width="1"/>
  <text x="85" y="72" font-family="'Segoe UI',sans-serif" font-size="11" font-weight="700" text-anchor="middle" fill="#FF9A00">push / PR</text>
  <text x="85" y="88" font-family="'Segoe UI',sans-serif" font-size="9" text-anchor="middle" fill="#ffd4a8" opacity="0.7">feat/* → develop</text>
  <text x="85" y="100" font-family="'Segoe UI',sans-serif" font-size="9" text-anchor="middle" fill="#ffd4a8" opacity="0.7">develop → main</text>
  <!-- Pulso trigger -->
  <rect x="20" y="50" width="130" height="52" rx="8" fill="none" stroke="#FF8C00" stroke-width="1.5" opacity="0">
    <animate attributeName="opacity" values="0;0.7;0" dur="3s" repeatCount="indefinite"/>
  </rect>

  <!-- Flecha trigger → GitHub Actions -->
  <line x1="150" y1="76" x2="198" y2="76" stroke="url(#pipe-h)" stroke-width="1.5" marker-end="url(#arr)"/>
  <circle r="4" fill="#FF9A00" opacity="0" filter="url(#glow)">
    <animateMotion dur="3s" repeatCount="indefinite">
      <mpath href="#p-trig"/>
    </animateMotion>
    <animate attributeName="opacity" values="0;1;1;0" dur="3s" repeatCount="indefinite"/>
  </circle>
  <path id="p-trig" d="M150,76 L198,76" fill="none"/>

  <!-- ── GITHUB ACTIONS ── -->
  <rect x="200" y="50" width="130" height="52" rx="8" fill="#1a0800" stroke="#FF6B00" stroke-width="1"/>
  <text x="265" y="72" font-family="'Segoe UI',sans-serif" font-size="11" font-weight="700" text-anchor="middle" fill="#FF9A00">⚙️ GitHub</text>
  <text x="265" y="86" font-family="'Segoe UI',sans-serif" font-size="11" font-weight="700" text-anchor="middle" fill="#FF9A00">Actions</text>
  <text x="265" y="100" font-family="'Segoe UI',sans-serif" font-size="8" text-anchor="middle" fill="#ffd4a8" opacity="0.6">orchestrator</text>

  <!-- Flecha GA → 3 jobs (se divide) -->
  <line x1="330" y1="76" x2="375" y2="76" stroke="#FF6B00" stroke-width="1" opacity="0.5"/>
  <!-- Rama arriba -->
  <line x1="375" y1="76" x2="375" y2="106" stroke="#FF6B00" stroke-width="0.8" opacity="0.4"/>
  <line x1="375" y1="106" x2="400" y2="106" stroke="url(#pipe-h)" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- Rama centro -->
  <line x1="375" y1="150" x2="400" y2="150" stroke="url(#pipe-h)" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- Rama abajo -->
  <line x1="375" y1="76" x2="375" y2="194" stroke="#FF6B00" stroke-width="0.8" opacity="0.4"/>
  <line x1="375" y1="194" x2="400" y2="194" stroke="url(#pipe-h)" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- Línea vertical -->
  <line x1="375" y1="76" x2="375" y2="194" stroke="#FF6B00" stroke-width="0.8" opacity="0.3"/>

  <!-- ── JOB 1 — LINT + TESTS ── -->
  <rect x="400" y="82" width="140" height="48" rx="7" fill="#0a0300" stroke="#FF6B00" stroke-width="0.8"/>
  <text x="470" y="101" font-family="'Segoe UI',sans-serif" font-size="10" font-weight="600" text-anchor="middle" fill="#FF9A00">✅ Lint + Tests</text>
  <text x="470" y="115" font-family="'Segoe UI',sans-serif" font-size="9" text-anchor="middle" fill="#ffd4a8" opacity="0.7">Vitest · Playwright</text>
  <text x="470" y="126" font-family="'Segoe UI',sans-serif" font-size="8" text-anchor="middle" fill="#27ae60" opacity="0.8">~45s</text>

  <!-- ── JOB 2 — ANGULAR BUILD ── -->
  <rect x="400" y="126" width="140" height="48" rx="7" fill="#0a0300" stroke="#FF6B00" stroke-width="0.8"/>
  <text x="470" y="145" font-family="'Segoe UI',sans-serif" font-size="10" font-weight="600" text-anchor="middle" fill="#FF9A00">🌐 Angular Build</text>
  <text x="470" y="159" font-family="'Segoe UI',sans-serif" font-size="9" text-anchor="middle" fill="#ffd4a8" opacity="0.7">Cloudflare Pages</text>
  <text x="470" y="170" font-family="'Segoe UI',sans-serif" font-size="8" text-anchor="middle" fill="#27ae60" opacity="0.8">~2min</text>

  <!-- ── JOB 3 — WORKER BUILD ── -->
  <rect x="400" y="170" width="140" height="48" rx="7" fill="#0a0300" stroke="#FF6B00" stroke-width="0.8"/>
  <text x="470" y="189" font-family="'Segoe UI',sans-serif" font-size="10" font-weight="600" text-anchor="middle" fill="#FF9A00">⚡ Worker Build</text>
  <text x="470" y="203" font-family="'Segoe UI',sans-serif" font-size="9" text-anchor="middle" fill="#ffd4a8" opacity="0.7">wrangler deploy</text>
  <text x="470" y="214" font-family="'Segoe UI',sans-serif" font-size="8" text-anchor="middle" fill="#27ae60" opacity="0.8">~30s</text>

  <!-- Bolas animadas en los 3 jobs en paralelo -->
  <circle r="3.5" fill="#FF9A00" opacity="0" filter="url(#glow)">
    <animateMotion dur="3s" repeatCount="indefinite" begin="0.5s">
      <mpath href="#p-job1"/>
    </animateMotion>
    <animate attributeName="opacity" values="0;1;1;0" dur="3s" repeatCount="indefinite" begin="0.5s"/>
  </circle>
  <path id="p-job1" d="M400,106 L540,106" fill="none"/>

  <circle r="3.5" fill="#FF9A00" opacity="0" filter="url(#glow)">
    <animateMotion dur="3s" repeatCount="indefinite" begin="0.8s">
      <mpath href="#p-job2"/>
    </animateMotion>
    <animate attributeName="opacity" values="0;1;1;0" dur="3s" repeatCount="indefinite" begin="0.8s"/>
  </circle>
  <path id="p-job2" d="M400,150 L540,150" fill="none"/>

  <circle r="3.5" fill="#FF9A00" opacity="0" filter="url(#glow)">
    <animateMotion dur="3s" repeatCount="indefinite" begin="1.1s">
      <mpath href="#p-job3"/>
    </animateMotion>
    <animate attributeName="opacity" values="0;1;1;0" dur="3s" repeatCount="indefinite" begin="1.1s"/>
  </circle>
  <path id="p-job3" d="M400,194 L540,194" fill="none"/>

  <!-- ── MERGE ── los 3 jobs convergen -->
  <line x1="540" y1="106" x2="585" y2="106" stroke="#FF6B00" stroke-width="0.8" opacity="0.4"/>
  <line x1="540" y1="150" x2="585" y2="150" stroke="#FF6B00" stroke-width="0.8" opacity="0.4"/>
  <line x1="540" y1="194" x2="585" y2="194" stroke="#FF6B00" stroke-width="0.8" opacity="0.4"/>
  <line x1="585" y1="106" x2="585" y2="194" stroke="#FF6B00" stroke-width="0.8" opacity="0.3"/>
  <line x1="585" y1="150" x2="610" y2="150" stroke="url(#pipe-h)" stroke-width="1.5" marker-end="url(#arr-g)"/>

  <!-- Bola merge -->
  <circle r="4" fill="#27ae60" opacity="0" filter="url(#glow)">
    <animateMotion dur="3s" repeatCount="indefinite" begin="2.5s">
      <mpath href="#p-merge"/>
    </animateMotion>
    <animate attributeName="opacity" values="0;1;1;0" dur="3s" repeatCount="indefinite" begin="2.5s"/>
  </circle>
  <path id="p-merge" d="M585,150 L610,150" fill="none"/>

  <!-- ── PRISMA MIGRATE ── -->
  <rect x="612" y="126" width="140" height="48" rx="7" fill="#0a1a0a" stroke="#27ae60" stroke-width="0.8"/>
  <text x="682" y="145" font-family="'Segoe UI',sans-serif" font-size="10" font-weight="600" text-anchor="middle" fill="#7adb8a">🗄️ Prisma Migrate</text>
  <text x="682" y="159" font-family="'Segoe UI',sans-serif" font-size="9" text-anchor="middle" fill="#7adb8a" opacity="0.7">→ Supabase</text>
  <text x="682" y="170" font-family="'Segoe UI',sans-serif" font-size="8" text-anchor="middle" fill="#27ae60" opacity="0.8">~10s</text>

  <!-- Flecha prisma → deploy -->
  <line x1="752" y1="150" x2="798" y2="150" stroke="#27ae60" stroke-width="1.2" marker-end="url(#arr-g)" stroke-dasharray="4,2">
    <animate attributeName="stroke-dashoffset" values="0;-12" dur="0.8s" repeatCount="indefinite"/>
  </line>

  <!-- ── DEPLOY ── -->
  <rect x="800" y="120" width="80" height="60" rx="8" fill="#0a1a0a" stroke="#27ae60" stroke-width="1.2"/>
  <text x="840" y="143" font-family="'Segoe UI',sans-serif" font-size="11" font-weight="700" text-anchor="middle" fill="#7adb8a">🚀</text>
  <text x="840" y="158" font-family="'Segoe UI',sans-serif" font-size="10" font-weight="600" text-anchor="middle" fill="#7adb8a">Deploy</text>
  <text x="840" y="172" font-family="'Segoe UI',sans-serif" font-size="8" text-anchor="middle" fill="#7adb8a" opacity="0.7">~3min total</text>
  <!-- Pulso deploy -->
  <rect x="800" y="120" width="80" height="60" rx="8" fill="none" stroke="#27ae60" stroke-width="2" opacity="0">
    <animate attributeName="opacity" values="0;0.8;0" dur="2s" repeatCount="indefinite" begin="3s"/>
  </rect>

  <!-- ── LEYENDA RAMAS ── -->
  <text x="450" y="240" font-family="'Segoe UI',sans-serif" font-size="10" text-anchor="middle" fill="#ffd4a8" opacity="0.6">
    <tspan fill="#FF4444">●</tspan> main → producción &nbsp;&nbsp;
    <tspan fill="#FFD700">●</tspan> develop → staging &nbsp;&nbsp;
    <tspan fill="#27ae60">●</tspan> feat/* → local
  </text>

</svg>
